application:
  subdomain: hermes-studio
  upstreams:
    - location: /
      backend: http://hermes-webui:{{ .U.port }}/
    - location: /preview/
      backend: http://hermes-webui:{{ .U.preview_frontend_port }}/
      disable_auto_health_checking: true

    - location: /xai-oauth/
      backend: http://hermes-webui:{{ .U.xai_oauth_port }}/
      disable_auto_health_checking: true

  public_path:
    - /

services:
  hermes-webui:
    #  ekkoye8888/hermes-web-ui:v0.6.17
    image: registry.lazycat.cloud/czyt/ekkoye8888/hermes-web-ui:bd7ee47f8a824d28
    environment:
      - PORT={{ .U.port }}
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - PATH=/home/agent/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_ALLOW_ROOT_GATEWAY=1
    binds:
      - /lzcapp/var/home:/home/agent
      - /lzcapp/var/cache:/lzcapp/cache

    setup_script: |
      #!/bin/sh
      set -u
      umask 022

      log() {
        echo "[setup] $*"
      }

      die() {
        echo "[setup] ERROR: $*" >&2
        exit 1
      }

      ROOTFS=/lzcapp/cache/rootfs
      BASE=$ROOTFS/base
      UPPER=$ROOTFS/upper
      WORK=$ROOTFS/work
      DIRS="etc opt root srv usr var"

      is_mounted() {
        mountpoint -q "$1" 2>/dev/null && return 0
        awk -v path="$1" '$2 == path { found = 1 } END { exit found ? 0 : 1 }' /proc/mounts
      }

      safe_rm_dir() {
        target="$1"
        case "$target" in
          "$ROOTFS"/base.new.*|"$ROOTFS"/base.old.*|"$WORK"/*)
            rm -rf "$target"
            ;;
          *)
            die "refusing to remove unexpected path: $target"
            ;;
        esac
      }

      mkdir -p "$ROOTFS" "$UPPER" "$WORK" /home/agent/.local/bin /home/agent/.hermes /home/agent/.hermes-web-ui

      # Image fingerprint: use the root overlay mount so latest-tag updates are detected.
      ROOT_MOUNT=$(awk '$5 == "/" && $0 ~ / - overlay / { print; exit }' /proc/1/mountinfo)
      [ -n "$ROOT_MOUNT" ] || die "cannot find root overlay mount in /proc/1/mountinfo"
      CURRENT_ID=$(printf '%s' "$ROOT_MOUNT" | md5sum | cut -d' ' -f1)
      STORED_ID=$(cat "$ROOTFS/.image-id" 2>/dev/null)

      NEED_SNAPSHOT=0
      if [ ! -f "$ROOTFS/.image-id" ]; then
        log "first boot: creating base snapshot"
        NEED_SNAPSHOT=1
      elif [ "$CURRENT_ID" != "$STORED_ID" ]; then
        log "image update detected ($STORED_ID -> $CURRENT_ID)"
        log "refreshing base snapshot; user changes stay in upper"
        NEED_SNAPSHOT=1
      fi

      if [ "$NEED_SNAPSHOT" = "1" ]; then
        NEW_BASE=$ROOTFS/base.new.$$
        OLD_BASE=$ROOTFS/base.old.$$

        safe_rm_dir "$NEW_BASE"
        safe_rm_dir "$OLD_BASE"
        mkdir -p "$NEW_BASE"

        for d in $DIRS; do
          if [ -d "/$d" ] && ! [ -L "/$d" ]; then
            mkdir -p "$NEW_BASE/$d"
            tar -C "/$d" -cf - . | tar -C "$NEW_BASE/$d" -xf - || die "snapshot failed for /$d"
          fi
        done

        for f in resolv.conf hostname hosts; do
          [ -f "/etc/$f" ] && cp -f "/etc/$f" "$NEW_BASE/etc/$f" 2>/dev/null
        done

        [ -d "$BASE" ] && mv "$BASE" "$OLD_BASE"
        mv "$NEW_BASE" "$BASE" || die "failed to activate base snapshot"
        echo "$CURRENT_ID" > "$ROOTFS/.image-id"
        safe_rm_dir "$OLD_BASE"
        log "base snapshot ready"
      elif [ -d "$BASE/etc" ] && ! is_mounted /etc; then
        # Docker rewrites these files for each container boot. Keep the lowerdir current
        # before /etc is mounted over it.
        for f in resolv.conf hostname hosts; do
          [ -f "/etc/$f" ] && cp -f "/etc/$f" "$BASE/etc/$f" 2>/dev/null
        done
      fi

      [ -d "$BASE" ] || die "base snapshot is missing"

      n=0
      failed=0
      for d in $DIRS; do
        [ -d "$BASE/$d" ] || continue
        [ -d "/$d" ] || continue

        if is_mounted "/$d"; then
          log "/$d already mounted; skipping"
          continue
        fi

        mkdir -p "$UPPER/$d"
        safe_rm_dir "$WORK/$d"
        mkdir -p "$WORK/$d"

        if mount -t overlay overlay \
          -o "lowerdir=$BASE/$d,upperdir=$UPPER/$d,workdir=$WORK/$d" \
          "/$d"; then
          n=$((n+1))
        else
          echo "[setup] ERROR: overlay mount failed for /$d" >&2
          failed=1
        fi
      done

      [ "$failed" = "0" ] || die "rootfs persistence is not active"
      log "rootfs: $n dirs overlay (base lower + user upper)"

      # --- Bash history: persist via bind-mounted /home/agent ---
      BASHRC=/home/agent/.bashrc
      if ! grep -q "history -a" "$BASHRC" 2>/dev/null; then
        printf '\n# History: write after each command (survives container kill)\nexport HISTFILE=~/.bash_history\nexport HISTSIZE=10000\nexport HISTFILESIZE=20000\nexport PROMPT_COMMAND="history -a; $PROMPT_COMMAND"\n' >> "$BASHRC"
        log "bash history config added to .bashrc"
      fi
